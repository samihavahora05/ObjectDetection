<svg viewBox="0 0 360 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020408"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D121A"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007BFF"/>
      <stop offset="100%" stop-color="#0056D6"/>
    </linearGradient>
  </defs>

  <rect width="360" height="760" rx="36" fill="url(#bg)"/>
  <rect x="4" y="4" width="352" height="752" rx="32" fill="none" stroke="#111827" stroke-width="2"/>

  <!-- Status bar -->
  <text x="30" y="40" fill="#4b5563" font-family="Arial" font-size="12">9:41</text>

  <!-- HUD Header -->
  <text x="30" y="86" fill="#007BFF" font-family="Arial" font-weight="900" font-size="10" letter-spacing="2">WELCOME BACK</text>
  <text x="30" y="112" fill="#F5F7FA" font-family="Arial" font-weight="800" font-size="22">Samiha</text>
  <circle cx="322" cy="96" r="20" fill="#0D121A" stroke="#1f2937" stroke-width="1.5"/>
  <circle cx="322" cy="96" r="6" fill="#007BFF"/>

  <!-- Big scan card -->
  <rect x="24" y="150" width="312" height="150" rx="20" fill="url(#cardGrad)" stroke="#141b26" stroke-width="1.5"/>
  <text x="46" y="184" fill="#6b7280" font-family="Arial" font-size="10" letter-spacing="2" font-weight="700">NEURAL ENGINE</text>
  <text x="46" y="212" fill="#F5F7FA" font-family="Arial" font-size="18" font-weight="800">Real-time Detection</text>
  <text x="46" y="234" fill="#8a94a3" font-family="Arial" font-size="11">On-device YOLOv8 · TensorFlow Lite</text>

  <rect x="46" y="252" width="220" height="34" rx="17" fill="url(#btnGrad)"/>
  <text x="70" y="274" fill="#ffffff" font-family="Arial" font-size="12" font-weight="800" letter-spacing="1">START DETECTION →</text>

  <!-- Quick stats row -->
  <g>
    <rect x="24" y="320" width="148" height="92" rx="16" fill="url(#cardGrad)" stroke="#141b26" stroke-width="1.5"/>
    <text x="42" y="350" fill="#6b7280" font-family="Arial" font-size="9" letter-spacing="1.5">DETECTIONS</text>
    <text x="42" y="382" fill="#F5F7FA" font-family="Arial" font-size="24" font-weight="800">128</text>

    <rect x="188" y="320" width="148" height="92" rx="16" fill="url(#cardGrad)" stroke="#141b26" stroke-width="1.5"/>
    <text x="206" y="350" fill="#6b7280" font-family="Arial" font-size="9" letter-spacing="1.5">AVG CONFIDENCE</text>
    <text x="206" y="382" fill="#007BFF" font-family="Arial" font-size="24" font-weight="800">91.4%</text>
  </g>

  <!-- Section title -->
  <text x="30" y="452" fill="#8a94a3" font-family="Arial" font-size="11" letter-spacing="2" font-weight="700">RECENT ACTIVITY</text>

  <!-- List items -->
  <g font-family="Arial">
    <rect x="24" y="466" width="312" height="58" rx="14" fill="url(#cardGrad)" stroke="#141b26" stroke-width="1.5"/>
    <circle cx="50" cy="495" r="14" fill="#0D121A" stroke="#22c55e" stroke-width="1.5"/>
    <text x="76" y="491" fill="#F5F7FA" font-size="12" font-weight="700">Person Detected</text>
    <text x="76" y="507" fill="#6b7280" font-size="10">12:45 PM · 99.2% confidence</text>

    <rect x="24" y="534" width="312" height="58" rx="14" fill="url(#cardGrad)" stroke="#141b26" stroke-width="1.5"/>
    <circle cx="50" cy="563" r="14" fill="#0D121A" stroke="#007BFF" stroke-width="1.5"/>
    <text x="76" y="559" fill="#F5F7FA" font-size="12" font-weight="700">Laptop / MacBook</text>
    <text x="76" y="575" fill="#6b7280" font-size="10">11:20 AM · 88.5% confidence</text>
  </g>

  <!-- Bottom floating nav -->
  <rect x="40" y="670" width="280" height="60" rx="30" fill="#0A0E14" stroke="#1f2937" stroke-width="1.5"/>
  <circle cx="90" cy="700" r="6" fill="#007BFF"/>
  <circle cx="150" cy="700" r="6" fill="#374151"/>
  <circle cx="210" cy="700" r="6" fill="#374151"/>
  <circle cx="270" cy="700" r="6" fill="#374151"/>
</svg>
