<svg viewBox="0 0 360 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020408"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D121A"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
  </defs>

  <rect width="360" height="760" rx="36" fill="url(#bg2)"/>
  <rect x="4" y="4" width="352" height="752" rx="32" fill="none" stroke="#111827" stroke-width="2"/>

  <text x="30" y="70" fill="#F5F7FA" font-family="Arial" font-weight="900" font-size="20" letter-spacing="1">SYSTEM STATS</text>
  <text x="30" y="90" fill="#6b7280" font-family="Arial" font-size="11">Model performance &amp; on-device metrics</text>

  <!-- 2x2 metric grid -->
  <g font-family="Arial">
    <rect x="24" y="120" width="150" height="120" rx="18" fill="url(#cardGrad2)" stroke="#141b26" stroke-width="1.5"/>
    <circle cx="52" cy="150" r="16" fill="#007BFF" opacity="0.15"/>
    <text x="44" y="156" fill="#007BFF" font-size="14">⚡</text>
    <text x="42" y="190" fill="#F5F7FA" font-size="22" font-weight="800">23ms</text>
    <text x="42" y="210" fill="#6b7280" font-size="10" letter-spacing="1">INFERENCE SPEED</text>

    <rect x="186" y="120" width="150" height="120" rx="18" fill="url(#cardGrad2)" stroke="#141b26" stroke-width="1.5"/>
    <circle cx="214" cy="150" r="16" fill="#22c55e" opacity="0.15"/>
    <text x="206" y="156" fill="#22c55e" font-size="14">📊</text>
    <text x="204" y="190" fill="#F5F7FA" font-size="22" font-weight="800">94.2%</text>
    <text x="204" y="210" fill="#6b7280" font-size="10" letter-spacing="1">AVG CONFIDENCE</text>

    <rect x="24" y="252" width="150" height="120" rx="18" fill="url(#cardGrad2)" stroke="#141b26" stroke-width="1.5"/>
    <circle cx="52" cy="282" r="16" fill="#f59e0b" opacity="0.15"/>
    <text x="44" y="288" fill="#f59e0b" font-size="14">🧠</text>
    <text x="42" y="322" fill="#F5F7FA" font-size="22" font-weight="800">48MB</text>
    <text x="42" y="342" fill="#6b7280" font-size="10" letter-spacing="1">MODEL SIZE</text>

    <rect x="186" y="252" width="150" height="120" rx="18" fill="url(#cardGrad2)" stroke="#141b26" stroke-width="1.5"/>
    <circle cx="214" cy="282" r="16" fill="#a855f7" opacity="0.15"/>
    <text x="206" y="288" fill="#a855f7" font-size="14">⏱</text>
    <text x="204" y="322" fill="#F5F7FA" font-size="22" font-weight="800">43</text>
    <text x="204" y="342" fill="#6b7280" font-size="10" letter-spacing="1">SESSIONS TODAY</text>
  </g>

  <!-- bar chart -->
  <text x="30" y="410" fill="#8a94a3" font-family="Arial" font-size="11" letter-spacing="2" font-weight="700">DETECTIONS PER HOUR</text>
  <g fill="#007BFF">
    <rect x="30" y="500" width="24" height="40" rx="4"/>
    <rect x="70" y="470" width="24" height="70" rx="4"/>
    <rect x="110" y="440" width="24" height="100" rx="4" opacity="0.9"/>
    <rect x="150" y="410" width="24" height="130" rx="4"/>
    <rect x="190" y="460" width="24" height="80" rx="4" opacity="0.9"/>
    <rect x="230" y="490" width="24" height="50" rx="4" opacity="0.8"/>
    <rect x="270" y="430" width="24" height="110" rx="4"/>
    <rect x="310" y="480" width="24" height="60" rx="4" opacity="0.8"/>
  </g>
  <line x1="24" y1="540" x2="336" y2="540" stroke="#1f2937" stroke-width="1.5"/>
</svg>
