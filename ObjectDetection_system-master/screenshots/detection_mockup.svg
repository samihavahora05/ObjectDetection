<svg viewBox="0 0 360 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="cam" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#111826"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="laser" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007BFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#007BFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#007BFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="360" height="760" rx="36" fill="url(#cam)"/>
  <rect x="4" y="4" width="352" height="752" rx="32" fill="none" stroke="#111827" stroke-width="2"/>

  <!-- perspective grid -->
  <g stroke="#007BFF" stroke-width="1">
    <line x1="180" y1="470" x2="20" y2="720" opacity="0.15"/>
    <line x1="180" y1="470" x2="80" y2="720" opacity="0.2"/>
    <line x1="180" y1="470" x2="140" y2="720" opacity="0.25"/>
    <line x1="180" y1="470" x2="220" y2="720" opacity="0.25"/>
    <line x1="180" y1="470" x2="280" y2="720" opacity="0.2"/>
    <line x1="180" y1="470" x2="340" y2="720" opacity="0.15"/>
    <line x1="10" y1="540" x2="350" y2="540" opacity="0.15"/>
    <line x1="10" y1="600" x2="350" y2="600" opacity="0.2"/>
    <line x1="10" y1="660" x2="350" y2="660" opacity="0.25"/>
    <line x1="10" y1="710" x2="350" y2="710" opacity="0.3"/>
  </g>

  <!-- scanning brackets -->
  <g stroke="#007BFF" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M60,220 L60,255 M60,220 L95,220"/>
    <path d="M300,220 L300,255 M300,220 L265,220"/>
    <path d="M60,460 L60,425 M60,460 L95,460"/>
    <path d="M300,460 L300,425 M300,460 L265,460"/>
  </g>

  <!-- laser scan line -->
  <rect x="60" y="330" width="240" height="40" fill="url(#laser)"/>
  <line x1="60" y1="350" x2="300" y2="350" stroke="#007BFF" stroke-width="2"/>

  <!-- detected bounding boxes -->
  <rect x="110" y="260" width="90" height="130" fill="none" stroke="#22c55e" stroke-width="3"/>
  <text x="112" y="253" fill="#22c55e" font-family="Arial" font-size="11" font-weight="800">PERSON 96%</text>

  <rect x="215" y="300" width="60" height="45" fill="none" stroke="#22c55e" stroke-width="3"/>
  <text x="216" y="294" fill="#22c55e" font-family="Arial" font-size="10" font-weight="800">PHONE 88%</text>

  <!-- top HUD row -->
  <circle cx="54" cy="56" r="20" fill="#000000" opacity="0.5"/>
  <path d="M50,56 L58,48 M50,56 L58,64" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <text x="180" y="52" fill="#007BFF" font-family="Arial" font-size="10" font-weight="900" letter-spacing="2" text-anchor="middle">NEURAL_LINK_STREAM</text>
  <text x="180" y="68" fill="#ffffff" opacity="0.7" font-family="Arial" font-size="8" font-weight="700" letter-spacing="1" text-anchor="middle">60 FPS | TENSOR_ACTIVE</text>

  <circle cx="306" cy="56" r="20" fill="#000000" opacity="0.5"/>
  <circle cx="306" cy="50" r="2.5" fill="#ffffff"/>
  <circle cx="306" cy="56" r="2.5" fill="#ffffff"/>
  <circle cx="306" cy="62" r="2.5" fill="#ffffff"/>

  <!-- terminate button -->
  <rect x="80" y="640" width="200" height="64" rx="20" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="98" y="662" width="16" height="16" rx="3" fill="#ef4444"/>
  <text x="122" y="675" fill="#ef4444" font-family="Arial" font-size="13" font-weight="900" letter-spacing="1">TERMINATE</text>
</svg>
